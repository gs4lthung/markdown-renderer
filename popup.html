<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <span>Markdown Viewer</span>
  </header>

  <div class="status-section">
    <div id="status-indicator" class="status-row">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Checking page…</span>
    </div>
  </div>

  <section class="section">
    <div class="section-title">Theme</div>
    <div class="theme-pills" id="theme-btns">
      <button class="pill" data-theme="auto">Auto</button>
      <button class="pill" data-theme="light">Light</button>
      <button class="pill" data-theme="dark">Dark</button>
    </div>
  </section>

  <section class="section">
    <div class="section-title">Font size</div>
    <div class="slider-row">
      <span class="slider-label">A</span>
      <input type="range" id="font-size" min="13" max="22" value="16" step="1">
      <span class="slider-label big">A</span>
      <span id="font-size-val" class="slider-value">16px</span>
    </div>
  </section>

  <section class="section">
    <div class="section-title">File access</div>
    <p class="hint">To view local <code>.md</code> files, enable <strong>Allow access to file URLs</strong> in <a href="#" id="ext-settings">Extension settings</a>.</p>
  </section>

  <footer class="popup-footer">
    <span>v1.0.0</span>
    <a href="https://github.com" target="_blank" rel="noopener noreferrer" id="gh-link">GitHub</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
